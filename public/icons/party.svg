<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="popperGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </linearGradient>
  </defs>
  <!-- Party popper cone -->
  <polygon points="14,56 10,60 30,36" fill="url(#popperGrad)" stroke="#FF1493" stroke-width="1" stroke-linejoin="round"/>
  <!-- Cone stripes -->
  <line x1="16" y1="52" x2="26" y2="40" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  <line x1="13" y1="55" x2="23" y2="43" stroke="#00CED1" stroke-width="1" opacity="0.5"/>
  <!-- Burst opening -->
  <ellipse cx="30" cy="36" rx="4" ry="2.5" fill="#FF1493" transform="rotate(-40 30 36)"/>
  <!-- Confetti pieces - hot pink -->
  <rect x="34" y="14" width="3" height="3" rx="0.5" fill="#FF1493" transform="rotate(20 35.5 15.5)"/>
  <rect x="22" y="18" width="2.5" height="2.5" rx="0.5" fill="#FF1493" transform="rotate(-15 23 19)"/>
  <!-- Confetti pieces - gold -->
  <rect x="40" y="22" width="3" height="3" rx="0.5" fill="#FFD700" transform="rotate(45 41.5 23.5)"/>
  <rect x="28" y="8" width="2.5" height="2.5" rx="0.5" fill="#FFD700" transform="rotate(10 29 9)"/>
  <circle cx="48" cy="18" r="2" fill="#FFD700"/>
  <!-- Confetti pieces - cyan -->
  <circle cx="38" cy="10" r="1.8" fill="#00CED1"/>
  <circle cx="18" cy="12" r="1.5" fill="#00CED1"/>
  <rect x="44" y="30" width="2.5" height="2.5" rx="0.5" fill="#00CED1" transform="rotate(-30 45 31)"/>
  <!-- Small dots for sparkle -->
  <circle cx="50" cy="26" r="1" fill="#FF1493" opacity="0.7"/>
  <circle cx="26" cy="24" r="1" fill="#FFD700" opacity="0.7"/>
  <circle cx="42" cy="8" r="1.2" fill="#FF69B4" opacity="0.8"/>
  <!-- Streamers -->
  <path d="M30 34 Q36 28, 34 20 Q32 14, 36 8" fill="none" stroke="#FF1493" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32 33 Q40 26, 44 18 Q46 12, 50 10" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M29 35 Q24 26, 20 16 Q18 10, 20 6" fill="none" stroke="#00CED1" stroke-width="1.5" stroke-linecap="round"/>
</svg>