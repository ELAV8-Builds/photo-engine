<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect width="120" height="80" rx="4" fill="#0a0a0f"/>
  <!-- RGB split effect -->
  <rect x="20" y="20" width="40" height="28" rx="2" fill="#00FFFF" opacity="0.15" transform="translate(2, -1)"/>
  <rect x="20" y="20" width="40" height="28" rx="2" fill="#FF0040" opacity="0.15" transform="translate(-2, 1)"/>
  <rect x="20" y="20" width="40" height="28" rx="2" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
  <!-- Glitch bars -->
  <rect x="0" y="32" width="120" height="3" fill="#00FFFF" opacity="0.2" transform="translate(4, 0)"/>
  <rect x="0" y="48" width="80" height="2" fill="#FF0040" opacity="0.15" transform="translate(-6, 0)"/>
  <rect x="40" y="56" width="80" height="2" fill="#00FF00" opacity="0.1" transform="translate(3, 0)"/>
  <!-- Data corruption -->
  <rect x="72" y="24" width="32" height="16" rx="1" fill="#00FFFF" opacity="0.1"/>
  <text x="76" y="36" font-family="monospace" font-size="8" fill="#00FFFF" opacity="0.6">ERR</text>
  <rect x="72" y="44" width="40" height="8" rx="1" fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="12" y1="64" x2="108" y2="64" stroke="#00FFFF" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 2"/>
</svg>
