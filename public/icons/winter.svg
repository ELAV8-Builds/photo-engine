<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <g stroke="#87CEEB" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Main arms (6 directions) -->
    <line x1="32" y1="6" x2="32" y2="58"/>
    <line x1="9.5" y1="19" x2="54.5" y2="45"/>
    <line x1="9.5" y1="45" x2="54.5" y2="19"/>
    <!-- Branches on vertical arm -->
    <line x1="32" y1="14" x2="27" y2="10"/>
    <line x1="32" y1="14" x2="37" y2="10"/>
    <line x1="32" y1="50" x2="27" y2="54"/>
    <line x1="32" y1="50" x2="37" y2="54"/>
    <!-- Branches on top-right to bottom-left arm -->
    <line x1="46" y1="23" x2="49" y2="18"/>
    <line x1="46" y1="23" x2="50" y2="26"/>
    <line x1="18" y1="41" x2="14" y2="38"/>
    <line x1="18" y1="41" x2="15" y2="46"/>
    <!-- Branches on top-left to bottom-right arm -->
    <line x1="18" y1="23" x2="15" y2="18"/>
    <line x1="18" y1="23" x2="14" y2="26"/>
    <line x1="46" y1="41" x2="50" y2="38"/>
    <line x1="46" y1="41" x2="49" y2="46"/>
  </g>
  <!-- Center crystal -->
  <circle cx="32" cy="32" r="4" fill="url(#iceGrad)" stroke="#87CEEB" stroke-width="1.5"/>
  <!-- Small accent dots -->
  <circle cx="32" cy="9" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="32" cy="55" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="12" cy="20.5" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="52" cy="43.5" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="12" cy="43.5" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="52" cy="20.5" r="1.5" fill="#FFFFFF" opacity="0.8"/>
</svg>