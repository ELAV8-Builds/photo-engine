    <line x1="43.3" y1="35.3" x2="46.1" y2="38.1"/>
  </g>
  <!-- Water waves -->
  <path d="M6 50 Q14 44, 22 50 Q30 56, 38 50 Q46 44, 54 50 Q58 53, 62 50" fill="none" stroke="url(#waterGrad)" stroke-width="2.5" stroke-linecap="round"/>
