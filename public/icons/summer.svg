      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Sun body -->
