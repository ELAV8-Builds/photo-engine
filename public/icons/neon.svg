<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowSoft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow layer for diamond -->
  <polygon points="32,6 56,32 32,58 8,32" fill="none" stroke="#FF69B4" stroke-width="4" opacity="0.2" filter="url(#neonGlowSoft)"/>
  <!-- Main neon diamond outline -->
  <polygon points="32,6 56,32 32,58 8,32" fill="none" stroke="#BF00FF" stroke-width="2.5" stroke-linejoin="round" filter="url(#neonGlow)"/>
  <!-- Inner bright core line -->
  <polygon points="32,6 56,32 32,58 8,32" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>
  <!-- Inner smaller diamond -->
  <polygon points="32,18 44,32 32,46 20,32" fill="none" stroke="#BF00FF" stroke-width="1.5" stroke-linejoin="round" opacity="0.5" filter="url(#neonGlow)"/>
  <polygon points="32,18 44,32 32,46 20,32" fill="none" stroke="#FF69B4" stroke-width="0.5" stroke-linejoin="round" opacity="0.4"/>
  <!-- Corner glow dots -->
  <circle cx="32" cy="6" r="2" fill="#FF69B4" opacity="0.8" filter="url(#neonGlow)"/>
  <circle cx="56" cy="32" r="2" fill="#FF69B4" opacity="0.8" filter="url(#neonGlow)"/>
  <circle cx="32" cy="58" r="2" fill="#FF69B4" opacity="0.8" filter="url(#neonGlow)"/>
  <circle cx="8" cy="32" r="2" fill="#FF69B4" opacity="0.8" filter="url(#neonGlow)"/>
  <!-- Ambient sparkle dots -->
  <circle cx="32" cy="32" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="16" cy="14" r="1" fill="#BF00FF" opacity="0.4"/>
  <circle cx="50" cy="14" r="1" fill="#BF00FF" opacity="0.4"/>
  <circle cx="16" cy="50" r="1" fill="#BF00FF" opacity="0.4"/>
  <circle cx="50" cy="50" r="1" fill="#BF00FF" opacity="0.4"/>
</svg>